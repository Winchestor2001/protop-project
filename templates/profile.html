<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body{font-family:Inter,system-ui;background:#f6f8ff;margin:0;color:#0f172a}
    .wrap{max-width:920px;margin:40px auto;padding:0 16px}
    .card{background:#fff;border-radius:16px;box-shadow:0 10px 30px rgba(2,6,23,.08);padding:24px}
    h1{font-weight:800;margin:0 0 12px}
    .row{display:grid;grid-template-columns:160px 1fr;gap:12px;align-items:center;margin:10px 0;padding:12px;border:1px solid #e2e8f0;border-radius:12px}
    .label{color:#475569;font-weight:600}
    .val{font-weight:600}
    .note{margin-top:16px;color:#475569}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>My profile</h1>
      <div id="content">Loading...</div>
    </div>
  </div>
  <script>
    const API = `${location.protocol}//${location.host}`;
    async function load(){
      const r = await fetch(`${API}/api/auth/me`, {credentials:'include'});
      const j = await r.json();
      const c = document.getElementById('content');
      if (!j.user){ c.innerHTML = '<p>Please sign in to view your profile.</p>'; return; }
      const u = j.user;
      c.innerHTML = `
        <div class="row"><div class="label">Name</div><div class="val">${u.name||''}</div></div>
        <div class="row"><div class="label">Email</div><div class="val">${u.email||''}</div></div>
        <div class="row"><div class="label">Phone</div><div class="val">${u.phone||''}</div></div>
        <div class="row"><div class="label">Role</div><div class="val">${u.role||''}</div></div>
        <p class="note">Soon here will be settings to update your profile details.</p>
      `;
    }
    load();
  </script>
  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
